name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: pip install -e .

      - name: Import smoke test
        run: |
          python -c "import burnwatch; from burnwatch import BurnwatchClient, X402Monitor, PaymentMirror; print('burnwatch', burnwatch.__version__, 'import ok')"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
